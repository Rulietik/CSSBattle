<!DOCTYPE html>

<html lang="en">
   <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
			body {
				height: 100vh;
				background: #2D696F;
				display: grid;
				justify-content: center;
				align-items: center;
				margin: 0;
			}
			.quad {
				background: #81A5A9;
				width: 90px;
				height: 90px;
				grid-area: 1/1;
				position: relative;
			} 
			#top {
				margin-bottom: 110px;
				margin-right: 110px;
			}
			#bottom {
				margin-left: 110px;
				margin-top: 110px;
			}
			.circle {
				background: #81A5A9;
				width: 200px;
				height: 200px;
				border-radius: 10em;
				grid-area: 1/1;
			}
			.divide{
				background: #2D696F;
				width: 20px;
				height: 200px;
				grid-area: 1/1;
				margin-left: 90px;
			}
			#rotated {
				rotate: 90deg;
			}
			.dot {
				position: relative;
				width: 30px;
				height: 30px;
				background: #2D696F;
				grid-area: 1/1;
				border-radius: 10em;
			}
			#left {
				margin-bottom: 110px;
				margin-left: 30px;
			}
			#right {
				margin-top: 110px;
				margin-left: 140px;
			}
    </style> 
	 </head> 

	<body>
		<div class = "quad" id = "top"></div>
		<div class = "quad" id = "bottom"></div>
		<div class = "circle"></div>
		<div class = "divide"></div>
		<div class = "divide" id = "rotated"></div>
		<div class = "dot" id = "left"></div>
		<div class = "dot" id = "right"></div>
	</body>
</html>
