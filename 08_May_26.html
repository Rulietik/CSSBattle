<!DOCTYPE html>

<html lang="en">
   <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body{
            margin: 0px;
            padding: 0px;
            background: #DF914B;
        }
        .cup {
            position: absolute;
            width: 150px;
            height: 170px;
            border-radius: 0px 0px 20px 20px;
            background: #EEEEEE;
            left: 125px;
            top: 65px;
        }
        #left{
            left:80px;
        }
        #right{
            background: #DF914B;
            left:250px;
        }
        .handle{
            position: absolute;
            top:85px;
            width: 30px;
            height: 30px;
            border-style: solid;
            border-color: #EEEEEE;
            border-width: 20px;
            border-radius: 50%;
        }
    </style>
   </head> 

   <body>
    <div class = "cup"></div>
    <div class = "handle" id = "left"></div>
    <div class = "handle" id = "right"></div>
   </body>
</html>
