<!DOCTYPE html>

<html lang="en">
   <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
			.rectangle{
				background: #000000;
				width: 200px;
				height: 200px;
				position: absolute;
				left: 100px;
				top: 50px;
			}
			.circle{
				background: #FFFFFF;
				width: 100px;
				height: 100px;
				position: absolute;
				left: 150px;
				top: 100px;
				border-radius: 5em;
			}
			.cut{
				background: #FFFFFF;
				width: 90px;
				height: 90px;
				position: absolute;
				left: 50px;
				top: 5px;
				rotate: 45deg;
				box-shadow:
					290px 0px #FFFFFF,
					140px 141px #FFFFFF,
					150px -149px #FFFFFF
				;
			}
    </style>
   </head> 

	<body>
		<div class = "rectangle"></div>
		<div class = "circle"></div>
		<div class = "cut"></div>
		</div>
	</body>
</html>
