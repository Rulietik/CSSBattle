<!DOCTYPE html>

<html lang="en">
   <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
			body {
			 background: #EFEADE;
				margin: 0px;
			}
			.circle{
				width: 50px;
				height: 50px;
				background: #594F7C;
				border-radius:  5rem;
				position: absolute;
			}
			#left{
				top: 45px;
				left: 75px;
			}
			#right{
				top: 45px;
				left: 275px;
			}
			#bottom{
				top: 205px;
				left: 175px;
			}
			.halfCircle{
				width: 100px;
				height: 50px;
				background: #594F7C;
				border-radius: 0 0 5rem 5rem;
				position: absolute;
			}
			#start{
				top: 105px;
				left: 50px;
			}
			#middle{
				top: 145px;
				left: 150px;
				rotate: 180deg;
			}
			#end{
				top: 105px;
				left: 250px;
			}
		</style>
   </head> 

   <body>
   	<div class = "circle" id = "left"></div>
		<div class = "circle" id = "right"></div>
		<div class = "circle" id = "bottom"></div>
		<div class = "halfCircle" id = "start"></div>
		<div class = "halfCircle" id = "middle"></div>
		<div class = "halfCircle" id = "end"></div> 
   </body>
</html>
