<!DOCTYPE html>
<html>
  <head>
    <style>
    .brick{
        position: absolute;
        width: 20px;
        height: 220px;
        background: #D9D9D9;
        border-style: solid;
        border-color: black;
        border-width: 10px;
    }
    #left{
        left: 100px;
        top:30px;
    }
    #middle{
        rotate: 90deg;
        left: 180px;
        top: 30px;
    }
    #right{
        left: 260px;
        top: 30px;
    }
    body{
        margin: 0;
        background: #D5914F
    }
    </style>
  </head>
  <body>
    <div class = "brick" id = "left" ></div>
    <div class = "brick" id = "middle" ></div>
    <div class = "brick" id = "right" ></div>
  </body>
</html>
